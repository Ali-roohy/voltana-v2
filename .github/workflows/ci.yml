name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: Go API — build · vet · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voltana-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: voltana-api/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  web:
    name: Frontend — typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voltana-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: voltana-web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
