worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;
    server_tokens      off;   # don't expose nginx version

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # auth: 10 req/min per IP (burst of 5)
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;

    # ── HTTP — redirect + ACME challenge ──────────────────────────────────────
    # DuckDNS provides a single subdomain (no www variant), so there is no
    # www → apex redirect to handle.
    server {
        listen 80;
        server_name ${DOMAIN};

        # Let certbot verify domain ownership via webroot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — main app ────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN};

        # Let's Encrypt certificates (managed by certbot)
        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

        # TLSv1.2 + TLSv1.3 only; modern cipher list (Mozilla Intermediate)
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # OCSP stapling
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY"                                         always;
        add_header X-Content-Type-Options     "nosniff"                                      always;
        add_header X-XSS-Protection           "1; mode=block"                                always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"     always;

        # ── Auth endpoints — rate-limited proxy ───────────────────────────────
        location /auth/ {
            limit_req zone=auth_zone burst=5 nodelay;
            limit_req_status 429;

            resolver 127.0.0.11 valid=10s ipv6=off;
            set $upstream http://api:9090;
            proxy_pass         $upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── API — proxy to Go API ─────────────────────────────────────────────
        location ~ ^/(v1|health)(/|$) {
            resolver 127.0.0.11 valid=10s ipv6=off;
            set $upstream http://api:9090;
            proxy_pass         $upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── React SPA — serve from built dist; SPA fallback ──────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
