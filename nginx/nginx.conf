worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name _;

        location / {
            # Re-resolve the api container name per request via Docker's embedded DNS,
            # so recreating the api container (new IP) is picked up within the TTL
            # without an nginx reload. A static `upstream`/`proxy_pass http://api`
            # caches the IP at startup and strands on a stale container after a swap.
            resolver 127.0.0.11 valid=10s ipv6=off;
            set $upstream http://api:9090;
            # $request_uri is required: a variabilized proxy_pass does not append the
            # original path automatically.
            proxy_pass         $upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
