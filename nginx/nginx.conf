worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    server {
        listen 80;
        server_name _;

        # Auth endpoints — proxy to Go API
        location /auth/ {
            resolver 127.0.0.11 valid=10s ipv6=off;
            set $upstream http://api:9090;
            proxy_pass         $upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # API + health — proxy to Go API
        # Re-resolve via Docker embedded DNS so container IP changes are picked up
        # within the TTL without an nginx reload (avoids stale-IP routing after a swap).
        location ~ ^/(v1|health)(/|$) {
            resolver 127.0.0.11 valid=10s ipv6=off;
            set $upstream http://api:9090;
            proxy_pass         $upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # React SPA — serve from built dist; SPA fallback for client-side routing
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
