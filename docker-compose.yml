services:
  postgres:
    image: postgres:16-alpine
    container_name: voltana-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: voltana-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.17.0
    container_name: voltana-migrate
    volumes:
      - ./migrations:/migrations
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "migrate -path=/migrations -database postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: ./voltana-api
      dockerfile: Dockerfile
    container_name: voltana-api
    environment:
      PORT: 9090
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      APP_ENV: ${APP_ENV:-development}
      APP_URL: ${APP_URL:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@voltana.app}
      BALE_BOT_TOKEN: ${BALE_BOT_TOKEN:-}
      BALE_BOT_USERNAME: ${BALE_BOT_USERNAME:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
    # Force IPv4 for Telegram — Docker resolves the AAAA record by default and
    # the IPv6 path is unreachable/filtered in this environment.
    extra_hosts:
      - "api.telegram.org:149.154.166.110"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Dev SMTP catcher: registration verification emails land in the web UI at
  # http://localhost:8025 (SMTP on 1025, unauthenticated). Set SMTP_HOST=mailhog
  # and SMTP_PORT=1025 in the dev .env to route mail here. Dev-only — do not enable
  # on the production profile.
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: voltana-mailhog
    ports:
      - "8025:8025"
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: voltana-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
